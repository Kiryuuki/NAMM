<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAMM — Not Another Media Manager</title>
    <meta name="description" content="NAMM — Your media stack, jacked in. Self-hosted PWA for Jellyfin, Radarr, Sonarr, Prowlarr.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#FCE300">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <!-- Design system -->
    <link rel="stylesheet" href="/src/style.css">
    <!-- Phase 10: Aesthetics upgrade -->
    <link rel="stylesheet" href="/src/style-upgrade.css">
    <!-- Phase 10: Component additions -->
    <link rel="stylesheet" href="/src/style-additions.css">
    <!-- Phase 11: Sidebar collapse + Search modal -->
    <link rel="stylesheet" href="/src/style-phase11.css">
    <!-- Phase 22: UI/UX Refinement -->
    <link rel="stylesheet" href="/src/style-phase22.css">
    
    <!-- Runtime Config (Injected by Docker) -->
    <script src="/config.js"></script>
</head>
<body>
    <div id="app">
        <main id="container">
            <section id="main-panel"></section>
            <aside id="sidebar">
                <nav id="sidebar-nav"></nav>
                <div id="download-queue"></div>
                <div id="stats-panel"></div>
                <div class="sidebar-footer">
                    <div class="brand glitch-hover" data-text="[ NAMM ]">[ NAMM ]</div>
                    <span class="app-version">v1.2.6-CP</span>
                </div>
            </aside>
        </main>
    </div>
    
    <div id="toasts"></div>
    <div id="modal-container"></div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
